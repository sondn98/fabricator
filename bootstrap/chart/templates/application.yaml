{{- $global := .Values.global }}
{{- $syncCfg := .Values.syncConfig -}}
{{- range $appName, $appCfg := .Values.applications }}
{{- if $appCfg.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName }}
  namespace: {{ $global.appNamespace | default "argocd" }}
  {{ if $appCfg.finalizers }}
  finalizers:
    {{- range $appCfg.finalizers }}
    - {{ . }}
    {{- end }}
  {{ end }}
  {{ if $appCfg.labels }}
  labels:
    {{- range $appCfg.labels }}
    - {{ . }}
    {{- end }}
  {{ end }}
spec:
  project: {{ $appCfg.project | default "default" }}
  source:
    repoURL: {{ $global.repoURL }}
    targetRevision: {{ $global.targetRevision }}
    path: {{ $appCfg.path }}

    helm:
      passCredentials: false
      {{ if $appCfg.extraParams }}
      parameters:
        {{ range $appCfg.extraParams }}
        - name: {{ .name | quote }}
          value: {{ .value | quote }}
        {{- end }}
      {{ end}}
      releaseName: {{ $appName }}
      valueFiles:
        {{- range $appCfg.valueFiles }}
        - {{ . }}
        {{- end }}
      ignoreMissingValueFiles: false
      {{ if $appCfg.extraValues }}
      valuesObject:
        {{ toYaml $appCfg.extraValues | indent 8 }}
      {{ end }}
      skipCrds: false
      # skipSchemaValidation: false
      version: {{ $global.helmVersion }}
      # kubeVersion: {{ $global.kubeVersion }}

  destination:
    server: {{ $global.kubeServer | default "https://kubernetes.default.svc" }}
    namespace: {{ $appCfg.namespace | default $appName }}

  {{ if $appCfg.info }}
  info:
    {{ toYaml $appCfg.valueFiles | indent 4 }}
  {{ end }}

  syncPolicy:
    {{ if $syncCfg.autoSync.enabled }}
    automated:
      prune: {{ $syncCfg.autoSync.prune }}
      selfHeal: {{ $syncCfg.autoSync.selfHeal }}
      allowEmpty: {{ $syncCfg.autoSync.allowEmpty }}
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    {{ end }}
    syncOptions:
    {{- range $k, $v := $syncCfg.syncOptions }}
      - {{ $k }}={{ $v }}
    {{- end }}
    {{ if and $syncCfg.managedNamespaceMetadata $syncCfg.syncOptions.CreateNamespace }}
    managedNamespaceMetadata:
      {{ toYaml $syncCfg.managedNamespaceMetadata | indent 4 }}
    {{ end }}
  {{ if and $syncCfg.ignoreDifferences $syncCfg.syncOptions.RespectIgnoreDifferences }}
  ignoreDifferences:
    {{ toYaml $appCfg.valueFiles | indent 4 }}
  {{ end }}

  revisionHistoryLimit: {{ $global.revisionHistoryLimit }}
{{- end }}
{{- end }}
