apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  grafana-dashboard-provider.yaml: |-
    apiVersion: 1
    providers:
    - name: 'grafana-dashboard-provider'
      type: file
      disableDeletion: true
      editable: true
      updateIntervalSeconds: 300
      options:
        path: /opt/bitnami/grafana/dashboards
        foldersFromFilesStructure: true
